<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Matchmaker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f11;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.2rem; }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 2rem; }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.25rem;
      width: 100%;
      max-width: 1050px;
      align-items: start;
    }

    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
    }

    .card {
      background: #1a1a1f;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      padding: 1.25rem;
    }

    .card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.3rem;
      margin-top: 0.85rem;
    }

    label:first-of-type { margin-top: 0; }

    textarea, input[type="text"], select {
      width: 100%;
      background: #111115;
      border: 1px solid #2a2a32;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 0.85rem;
      padding: 0.5rem 0.7rem;
      outline: none;
      font-family: inherit;
      resize: vertical;
    }

    textarea:focus, input:focus { border-color: #5b6af0; }

    textarea { min-height: 220px; }

    .tag-input-wrap { position: relative; }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }

    .tag {
      background: #2a2a38;
      color: #bbb;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tag button {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
      line-height: 1;
    }
    .tag button:hover { color: #e74c3c; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.85rem;
      font-size: 0.85rem;
      color: #bbb;
      cursor: pointer;
    }
    input[type="checkbox"] { accent-color: #5b6af0; width: 15px; height: 15px; }

    .range-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.4rem;
    }
    input[type="range"] { flex: 1; accent-color: #5b6af0; }
    .range-val { font-size: 0.85rem; color: #5b6af0; min-width: 20px; }

    button.btn-primary {
      width: 100%;
      margin-top: 1.1rem;
      padding: 0.65rem;
      background: #5b6af0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button.btn-primary:hover { opacity: 0.85; }
    button.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Upload strip */
    .upload-strip {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.5rem;
    }
    .upload-strip input[type="file"] { display: none; }
    .upload-strip label.upload-btn {
      margin: 0;
      cursor: pointer;
      color: #5b6af0;
      font-size: 0.8rem;
      text-decoration: underline;
    }

    /* Results */
    #results-col { display: flex; flex-direction: column; gap: 1rem; }

    .empty-state {
      color: #444;
      font-size: 0.9rem;
      text-align: center;
      padding: 3rem 0;
    }

    .match-card {
      background: #1a1a1f;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      padding: 1.25rem;
    }

    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .match-title { font-size: 1rem; font-weight: 600; }
    .match-company { font-size: 0.82rem; color: #888; margin-top: 2px; }

    .score-badge {
      background: #1e2460;
      color: #a0aaff;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .match-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 0.75rem;
    }

    .pill {
      background: #212128;
      border: 1px solid #2a2a32;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.75rem;
      color: #999;
    }

    .pill.tech { color: #7eb8f7; border-color: #1e3050; background: #131a2a; }
    .pill.boost { color: #7ee8a2; border-color: #1a3525; background: #111e18; }
    .pill.mismatch { color: #e07070; border-color: #3a1a1a; background: #1e1010; }

    .explanation {
      font-size: 0.85rem;
      color: #bbb;
      line-height: 1.55;
      border-top: 1px solid #222228;
      padding-top: 0.75rem;
    }

    .score-bar-wrap { margin-bottom: 0.75rem; }
    .score-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 3px;
    }
    .score-track {
      height: 5px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b4ad0, #7b86ff);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #333;
      border-top-color: #5b6af0;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { color: #e74c3c; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>

<h1>CV Matchmaker</h1>
<p class="subtitle">Paste your CV, set preferences, and find your best-fit roles</p>

<div class="layout">
  <!-- Left: Input -->
  <div>
    <div class="card">
      <h2>Your CV</h2>
      <label for="cv-text">Paste your resume / CV text</label>
      <textarea id="cv-text" placeholder="Paste your full CV here..."></textarea>
      <div class="upload-strip">
        <span>or</span>
        <label class="upload-btn" for="cv-file">upload a .txt file</label>
        <input type="file" id="cv-file" accept=".txt,.md" />
      </div>
    </div>

    <div class="card" style="margin-top:1rem">
      <h2>Preferences</h2>

      <label>Preferred locations <span style="color:#555">(press Enter to add)</span></label>
      <input type="text" id="loc-input" placeholder="e.g. remote, london, berlin" />
      <div class="tag-row" id="loc-tags"></div>

      <label>Seniority level</label>
      <input type="text" id="level-input" placeholder="e.g. senior, mid, staff" />
      <div class="tag-row" id="level-tags"></div>

      <label>Tech stack <span style="color:#555">(press Enter)</span></label>
      <input type="text" id="tech-input" placeholder="e.g. python, rust, kubernetes" />
      <div class="tag-row" id="tech-tags"></div>

      <label>Number of results</label>
      <div class="range-row">
        <input type="range" id="top-n" min="1" max="10" value="5" />
        <span class="range-val" id="top-n-val">5</span>
      </div>

      <label class="checkbox-row">
        <input type="checkbox" id="startup-cb" checked />
        Open to startup / early-stage roles
      </label>

      <button class="btn-primary" id="match-btn">Find Matches</button>
      <div class="error-msg" id="error-msg" style="display:none"></div>
    </div>
  </div>

  <!-- Right: Results -->
  <div id="results-col">
    <div class="empty-state" id="empty-state">
      Results will appear here after matching.
    </div>
  </div>
</div>

<script>
  // ---- Tag inputs ----
  function makeTagInput(inputId, tagsId) {
    const input = document.getElementById(inputId);
    const row = document.getElementById(tagsId);
    const values = [];

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = input.value.trim().replace(/,$/, '');
        if (val && !values.includes(val)) {
          values.push(val);
          renderTags();
        }
        input.value = '';
      }
    });

    function renderTags() {
      row.innerHTML = '';
      values.forEach((v, i) => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.innerHTML = `${v}<button title="remove">×</button>`;
        tag.querySelector('button').addEventListener('click', () => {
          values.splice(i, 1);
          renderTags();
        });
        row.appendChild(tag);
      });
    }

    return () => [...values];
  }

  const getLocations = makeTagInput('loc-input', 'loc-tags');
  const getLevels    = makeTagInput('level-input', 'level-tags');
  const getTech      = makeTagInput('tech-input', 'tech-tags');

  // Range display
  const topNInput = document.getElementById('top-n');
  const topNVal = document.getElementById('top-n-val');
  topNInput.addEventListener('input', () => topNVal.textContent = topNInput.value);

  // File upload
  document.getElementById('cv-file').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    document.getElementById('cv-text').value = text;
  });

  // ---- Match ----
  document.getElementById('match-btn').addEventListener('click', async () => {
    const cvText = document.getElementById('cv-text').value.trim();
    if (cvText.length < 50) {
      showError('Please paste a longer CV (at least 50 characters).');
      return;
    }
    hideError();

    const btn = document.getElementById('match-btn');
    btn.innerHTML = '<span class="spinner"></span>Matching…';
    btn.disabled = true;

    const payload = {
      cv: cvText,
      preferred_locations: getLocations(),
      preferred_levels: getLevels(),
      preferred_tech: getTech(),
      open_to_startup: document.getElementById('startup-cb').checked,
      top_n: parseInt(topNInput.value),
    };

    try {
      const resp = await fetch('/match', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || resp.statusText);
      }
      const data = await resp.json();
      renderResults(data);
    } catch (err) {
      showError('Error: ' + err.message);
    } finally {
      btn.innerHTML = 'Find Matches';
      btn.disabled = false;
    }
  });

  function renderResults(data) {
    const col = document.getElementById('results-col');
    col.innerHTML = '';

    if (!data.matches.length) {
      col.innerHTML = '<div class="empty-state">No matches found.</div>';
      return;
    }

    const header = document.createElement('div');
    header.style.cssText = 'font-size:0.82rem;color:#666;padding:0.25rem 0';
    header.textContent = `Top ${data.matches.length} of ${data.total_jobs_searched} jobs`;
    col.appendChild(header);

    data.matches.forEach((m, idx) => {
      const card = document.createElement('div');
      card.className = 'match-card';

      const pct = (m.final_score * 100).toFixed(1);
      const semPct = (m.semantic_score * 100).toFixed(1);

      const boostPills = m.boost_reasons.map(r => {
        const isMismatch = r.toLowerCase().includes('mismatch') || r.toLowerCase().includes('excluded');
        return `<span class="pill ${isMismatch ? 'mismatch' : 'boost'}">${isMismatch ? '✕' : '✦'} ${r}</span>`;
      }).join('');

      const techPills = m.tech.map(t =>
        `<span class="pill tech">${t}</span>`
      ).join('');

      card.innerHTML = `
        <div class="match-header">
          <div>
            <div class="match-title">${idx + 1}. ${m.title}</div>
            <div class="match-company">${m.company} · ${m.location} · ${m.level}</div>
          </div>
          <div class="score-badge">${pct}%</div>
        </div>

        <div class="score-bar-wrap">
          <div class="score-bar-label">
            <span>Match score</span>
            <span>Semantic: ${semPct}%</span>
          </div>
          <div class="score-track">
            <div class="score-fill" style="width:${pct}%"></div>
          </div>
        </div>

        <div class="match-meta">
          ${techPills}
          ${boostPills}
        </div>

        <div class="explanation">${m.explanation}</div>
      `;

      col.appendChild(card);
    });
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() {
    document.getElementById('error-msg').style.display = 'none';
  }
</script>
</body>
</html>
